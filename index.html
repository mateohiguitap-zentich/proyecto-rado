<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema RADO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-card">
        <div class="row g-0 h-100">
            
            <div class="col-md-6 d-flex align-items-center">
                <div class="login-form-section w-100">
                    
                    <div class="logo-container">
                        <img src="img/logo_zentich.jpg" alt="Logo RADO">
                    </div>
                    
                    <div class="text-center">
                        <h1 class="system-title">ZENTICH SOLUCIONES</h1>
                        <p class="system-subtitle">Registro y Administración de Órdenes</p>
                    </div>

                    <h2 class="fs-6 fw-bold text-uppercase text-center mb-4" style="letter-spacing: 1px;">Inicio de sesión</h2>
                    
                    <form>
                        <div class="input-group-custom">
                            <i class="bi bi-person"></i>
                            <input type="text" placeholder="Usuario" required>
                        </div>
                        
                        <div class="input-group-custom">
                            <i class="bi bi-lock"></i>
                            <input type="password" placeholder="Contraseña" required>
                        </div>

                        <div class="button-wrapper">
                            <a href="dashboard.html" class="btn-acceder">ACCEDER</a>
                        </div>
                    </form>

                    <p class="footer-text">
                        © 2026 Sistema RADO | Medellín, Colombia <br>
                        Todos los derechos reservados.
                    </p>
                </div>
            </div>

            <div class="col-md-6 login-image-section">
                <div class="odontologos-frame">
                    <img src="img/logo_rado.png" alt="Odontólogos RADO">
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
