<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios | RADO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Nuevo Usuario - RADO</h3>
            </div>
            <div class="card-body">
                
                <form action="/procesar-registro" method="POST">
                    
                    <div class="mb-3">
                        <label for="nombreUsuario" class="form-label">Nombre de Usuario:</label>
                        <input type="text" class="form-control" id="nombreUsuario" name="nombreUsuario" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="contrasenaUsuario" class="form-label">Contraseña:</label>
                        <input type="password" class="form-control" id="contrasenaUsuario" name="contrasenaUsuario" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="rolUsuario" class="form-label">Rol en el sistema:</label>
                        <select class="form-select" id="rolUsuario" name="rolUsuario" required>
                            <option value="" disabled selected>Seleccione un rol...</option>
                            <option value="ADMINISTRADOR">Administrador</option>
                            <option value="OPERADOR">Operador</option>
                            <option value="AUDITOR">Auditor</option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>

</body>
</html>
